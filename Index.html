<html lang="en">

<body>

<div class="loader" id="loader"></div>

<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleConfig()"></div>

<div id="configSidebar" class="config-sidebar">
<div class="sidebar-header">
<h3>WORKSPACE SETTINGS</h3>
<button class="close-btn" onclick="toggleConfig()">✕</button>
</div>
<div class="sidebar-content">
<label>Global Spreadsheet ID <span class="info-icon" data-tip="Incolla l'ID completo del Google Sheet globale che funge da database master.">i</span></label>
<div style="display:flex; gap:8px; margin-bottom:20px;">
<input type="text" id="sheetId" class="glass-inp" placeholder="Incolla URL o ID..." style="margin-bottom:0;" oninput="extractIdOnPaste(this)">
<button class="btn btn-ghost" style="padding:0 16px; height:36px;" onclick="connect()">Connect</button>
</div>

<div id="configUI" style="display:none; animation: fadeIn 0.3s;">
<label>Active Worksheet <span class="info-icon" data-tip="Seleziona la scheda (tab) specifica del file globale da cui caricare i dati per l'allineamento.">i</span></label>
<select id="tabSelect" class="glass-inp" onchange="loadTabConfig()"></select>
<div style="display:flex; gap:12px; margin-bottom:24px; align-items: flex-end;">
<div style="flex:1;">
<label>Header Row <span class="info-icon" data-tip="La riga esatta in cui si trovano i titoli delle colonne nel file originale (di solito 1).">i</span></label>
<input type="number" id="headerRow" class="glass-inp" onchange="softRefresh()" style="margin:0;">
</div>
<div style="flex:1;">
<button class="btn btn-ghost" onclick="forceScan()" style="width:100%; height: 36px;">Re-scan Data</button>
</div>
</div>

<div style="border-top:1px solid var(--border-subtle); margin:24px 0;"></div>

<label style="color:var(--text-primary); margin-bottom:12px;">Data Mapping (Read)</label>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom: 12px;">
<div>
<label style="font-size:0.55rem; color:var(--text-tertiary);">User Context</label>
<select class="glass-inp map-sel" data-key="context" onchange="saveMap()"></select>
</div>
<div>
<label style="font-size:0.55rem; color:var(--text-tertiary);">Bot Output</label>
<select class="glass-inp map-sel" data-key="response" onchange="saveMap()"></select>
</div>
</div>
<div style="margin-bottom: 12px;">
<label style="font-size:0.55rem; color:var(--text-tertiary);">FTE Verdict (Optional)</label>
<select class="glass-inp map-sel" data-key="fteVerdict" onchange="saveMap()"></select>
</div>
<div style="margin-bottom: 24px; padding-top: 12px; border-top: 1px dashed var(--border-subtle);">
<label style="font-size:0.55rem; color:#c084fc;">Global Meeting Verdict (Read-Only) <span class="info-icon" data-tip="La colonna del verdetto definitivo cross-region. Sarà mostrata solo in lettura per dare contesto al team EMEA.">i</span></label>
<select class="glass-inp map-sel" style="border-color: rgba(168, 85, 247, 0.3);" data-key="globalMeeting" onchange="saveMap()"></select>
</div>

<label style="color:var(--accent-blue); margin-bottom:12px;">EMEA Alignment (Push)</label>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
<div>
<label style="font-size:0.55rem; color:var(--text-tertiary);">Final Verdict</label>
<select class="glass-inp map-sel" style="border-color:rgba(56, 189, 248, 0.3);" data-key="verdict" onchange="saveMap()"></select>
</div>
<div>
<label style="font-size:0.55rem; color:var(--text-tertiary);">Final Comment</label>
<select class="glass-inp map-sel" style="border-color:rgba(56, 189, 248, 0.3);" data-key="comment" onchange="saveMap()"></select>
</div>
</div>

<div style="border-top:1px solid var(--border-subtle); margin:24px 0;"></div>
<label style="color:var(--text-primary); margin-bottom:12px;">Automation Alerts <span class="info-icon" data-tip="Imposta gli alert via email automatici quando vengono aggiunte nuove righe nel file globale.">i</span></label>
<p style="font-size:0.65rem; color:var(--text-secondary); margin-bottom:8px;">1. Tracked Tabs:</p>
<div id="multiTabSelect" class="tab-checklist">
<i style="color:var(--text-tertiary); font-size:0.7rem;">Connect spreadsheet first...</i>
</div>

<p style="font-size:0.65rem; color:var(--text-secondary); margin-bottom:8px;">2. Notification Emails:</p>
<input type="text" id="notifyEmails" class="glass-inp" placeholder="team@example.com">
<button class="btn btn-ghost" style="width:100%;" onclick="setEmailTarget()">Save Configuration</button>
</div>
</div>
</div>

<div id="inspectorModal" class="modal-overlay" onclick="if(event.target===this) closeInspector()">
<div class="modal-box">
<div class="modal-header">
<div style="font-weight:600; color:var(--text-primary); font-size: 0.9rem;">Payload Inspector</div>
<button class="close-btn" onclick="closeInspector()">✕</button>
</div>
<div id="inspectorContent" class="modal-content"></div>
</div>
</div>

<div id="notesModal" class="modal-overlay" onclick="if(event.target===this) closeNotesModal()">
<div class="modal-box">
<div class="modal-header">
<div style="font-weight:600; color:var(--text-primary); font-size: 0.9rem;">Edit Peer Notes</div>
<button class="close-btn" onclick="closeNotesModal()">✕</button>
</div>
<div class="modal-content">
<div style="margin-bottom: 16px;">
<label style="color:var(--text-secondary); font-size:0.7rem;">WF_ALPHA Internal Note</label>
<textarea id="modalLisNote" class="t-textarea" style="height:100px; opacity:1; max-height:100px; margin-bottom:0;" placeholder="Add private context..."></textarea>
</div>
<div>
<label style="color:var(--text-secondary); font-size:0.7rem;">WF_BETA Internal Note</label>
<textarea id="modalKrkNote" class="t-textarea" style="height:100px; opacity:1; max-height:100px; margin-bottom:0;" placeholder="Add private context..."></textarea>
</div>
</div>
<div style="padding:16px 24px; border-top:1px solid var(--border-subtle); display:flex; justify-content:flex-end; gap:8px; background: var(--bg-base); border-radius: 0 0 12px 12px;">
<button class="btn btn-ghost" onclick="closeNotesModal()">Cancel</button>
<button class="btn btn-gold" onclick="saveNotesModal()">Save Notes</button>
</div>
</div>
</div>

<div class="app-container">
<div class="header">
<div class="header-left">
<button class="btn-icon" onclick="toggleConfig()" title="Settings">

</button>
<div class="logo">
<img src="https://i.postimg.cc/nLxkRVJp/preview.png" alt="Logo">
Viriathus | Alignment Console
</div>
</div>
<div style="display:flex; gap: 12px; align-items:center;">
<div id="status" style="font-family:var(--font-ui); font-size:0.7rem; font-weight: 500; color:var(--text-secondary); background: var(--bg-base); padding: 6px 12px; border-radius: 6px; border:1px solid var(--border-strong);">AWAITING CONNECTION</div>
</div>
</div>

<div class="table-box">
<div class="table-header-bar">
<div style="font-weight:600; font-size:0.85rem; display:flex; gap:12px; align-items:center;">
<span>Calibration Stream</span>
<div id="pageInfo" style="font-family:var(--font-code); color:var(--text-secondary); font-size:0.7rem; background: var(--bg-base); border: 1px solid var(--border-strong); padding: 2px 8px; border-radius: 4px;">Standing by</div>
</div>
<div style="display:flex; gap:8px;">
<button class="btn btn-ghost" onclick="changePage(-1)">Previous</button>
<button class="btn btn-ghost" onclick="changePage(1)">Next</button>
<button class="btn btn-ghost" onclick="loadData()">Refresh</button>
</div>
</div>
<div class="table-scroll">
<table id="mainTable">
<thead id="tHead">
<tr>
<th style="width:60px; text-align:center;">ID <span class="info-icon" data-tip="Global Spreadsheet Row Index">i</span></th>
<th style="width:38%;">Payload Context <span class="info-icon" data-tip="Click to expand prompt/response pairs in the Inspector Modal">i</span></th>
<th style="width:24%;">Local Drafts <span class="info-icon" data-tip="Internal team votes. Saved to Shadow DB, not pushed globally.">i</span></th>
<th style="width:24%;">Global Alignment <span class="info-icon" data-tip="Authoritative conclusion written directly to the target spreadsheet.">i</span></th>
<th style="width:110px; text-align:center;">Action</th>
</tr>
</thead>
<tbody id="tBody"></tbody>
</table>
</div>
</div>
