<style>
/* =========================================================
ENTERPRISE DESIGN SYSTEM (Linear/Vercel Inspired)
========================================================= */
:root {
--bg-base: #09090b;
--bg-surface: #18181b;
--bg-surface-hover: #27272a;
--bg-elevated: #27272a;
--accent-gold: #dcd2a6;
--accent-gold-dim: rgba(220, 210, 166, 0.1);
--accent-blue: #38bdf8;
--accent-blue-dim: rgba(56, 189, 248, 0.1);
--danger: #ef4444;
--danger-dim: rgba(239, 68, 68, 0.15);
--success: #10b981;
--success-dim: rgba(16, 185, 129, 0.1);
--warning: #f59e0b;
--text-primary: #f4f4f5;
--text-secondary: #a1a1aa;
--text-tertiary: #71717a;
--border-subtle: #27272a;
--border-strong: #3f3f46;
--font-ui: 'Inter', system-ui, -apple-system, sans-serif;
--font-code: 'JetBrains Mono', monospace;
--focus-ring: 0 0 0 2px var(--bg-base), 0 0 0 4px var(--accent-gold);
--shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
--shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 2px 4px -2px rgba(0,0,0,0.4);
--shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5), 0 4px 6px -4px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
body {
background-color: var(--bg-base);
color: var(--text-primary);
font-family: var(--font-ui);
height: 100vh;
overflow: hidden;
padding: 16px;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}

/* Layout Components */
.app-container { display: flex; flex-direction: column; height: 100%; gap: 16px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); padding: 12px 24px; border-radius: 12px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { font-weight: 700; font-size: 1.1rem; letter-spacing: 0.05em; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
.logo img { height: 24px; }
.logo span { color: var(--accent-gold); }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: all 0.2s ease; font-family: var(--font-ui); font-size: 0.75rem; display: inline-flex; justify-content: center; align-items: center; gap: 6px; white-space: nowrap; }
.btn:focus-visible { box-shadow: var(--focus-ring); }
.btn:active { transform: scale(0.98); }
.btn-gold { background: var(--accent-gold); color: var(--bg-base); }
.btn-gold:hover { background: #e8e0c0; }
.btn-cyan { background: var(--accent-blue); color: var(--bg-base); }
.btn-cyan:hover { background: #7dd3fc; }
.btn-ghost { background: transparent; color: var(--text-primary); border: 1px solid var(--border-strong); }
.btn-ghost:hover { background: var(--bg-surface-hover); border-color: var(--text-tertiary); }
.btn-disabled { opacity: 0.35; pointer-events: none; filter: grayscale(100%); }

.btn-icon { background: transparent; border: 1px solid var(--border-strong); color: var(--text-secondary); border-radius: 6px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
.btn-icon:hover { background: var(--bg-surface-hover); color: var(--accent-gold) !important; border-color: var(--accent-gold) !important; }

/* Forms & Inputs */
label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; letter-spacing: 0.05em; }
.glass-inp { background: var(--bg-base); border: 1px solid var(--border-strong); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; width: 100%; font-family: var(--font-ui); transition: 0.2s; font-size: 0.8rem; height: 36px; }
.glass-inp:focus { border-color: var(--accent-gold); box-shadow: 0 0 0 1px var(--accent-gold); }
.glass-inp::placeholder { color: var(--text-tertiary); }
select.glass-inp { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; background-size: 14px; cursor: pointer; }

/* Table & Data Container */
.table-box { flex-grow: 1; overflow: hidden; background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border-subtle); display: flex; flex-direction: column; box-shadow: var(--shadow-md); }
.table-header-bar { padding: 12px 24px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); }
.table-scroll { overflow: auto; flex-grow: 1; width: 100%; scroll-behavior: smooth; }
table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1300px; }
th { position: sticky; top: 0; background: var(--bg-surface); color: var(--text-secondary); font-size: 0.65rem; text-transform: uppercase; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-strong); z-index: 10; font-weight: 600; letter-spacing: 0.05em; white-space: nowrap; }
td { padding: 16px; border-bottom: 1px solid var(--border-subtle); vertical-align: top; transition: background-color 0.2s; }
th:not(:last-child), td:not(:last-child) { border-right: 1px solid var(--border-subtle); }
tbody tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.02); }
tbody tr:hover td { background-color: rgba(255, 255, 255, 0.04); }
/* Semantic Row States */
.row-green td { background-color: var(--success-dim) !important; }
.row-green td:first-child { border-left: 3px solid var(--success); }
.row-conflict td { background-color: var(--danger-dim) !important; }
.row-conflict td:first-child { border-left: 3px solid var(--danger); }
/* DEEP LINKING GLOW ANIMATION */
@keyframes targetGlow {
0% { background-color: rgba(56, 189, 248, 0.2); box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.2); }
10% { background-color: rgba(56, 189, 248, 0.35); box-shadow: inset 0 0 30px rgba(56, 189, 248, 0.4); }
100% { background-color: rgba(56, 189, 248, 0.05); box-shadow: inset 0 0 0px transparent; }
}
.highlight-row td { animation: targetGlow 4s ease-out forwards; }
.highlight-row td:first-child { border-left: 3px solid var(--accent-blue) !important; }

/* Payload Content Blocks */
.payload-card { background: var(--bg-base); border: 1px solid var(--border-strong); border-radius: 8px; padding: 14px; transition: all 0.2s ease; cursor: pointer; }
.payload-card:hover { border-color: var(--text-tertiary); }
.pl-label { font-size: 0.6rem; color: var(--text-secondary); font-family: var(--font-code); font-weight: 600; margin-bottom: 6px; display: block; }
.pl-text-ctx { border-left: 3px solid var(--text-tertiary); padding-left: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.85rem; color: var(--text-primary); line-height: 1.5; margin-bottom: 16px; }
.pl-text-res { border-left: 3px solid var(--accent-blue); padding-left: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0; }
.link-chip { display: inline-flex; background: var(--accent-blue-dim); border: 1px solid rgba(56, 189, 248, 0.2); color: var(--accent-blue); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; text-decoration: none; font-family: var(--font-code); transition: 0.2s; }
.link-chip:hover { background: var(--accent-blue); color: var(--bg-base); }

/* Table Forms */
.t-select { background: var(--bg-base); border: 1px solid var(--border-strong); color: var(--text-primary); padding: 8px; border-radius: 6px; width: 100%; font-size: 0.75rem; font-family: var(--font-ui); margin-bottom: 8px; transition: border-color 0.2s ease, box-shadow 0.2s ease; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; background-size: 12px; }
.t-select:focus { border-color: var(--accent-gold) !important; box-shadow: 0 0 0 1px var(--accent-gold); }
.t-textarea { background: var(--bg-base); border: 1px solid var(--border-strong); color: var(--text-primary); width: 100%; padding: 8px; border-radius: 6px; font-size: 0.75rem; font-family: var(--font-ui); resize: none; height: 70px; line-height: 1.4; transition: opacity 0.3s ease, margin 0.3s ease, max-height 0.3s ease; }
.t-textarea:focus { border-color: var(--accent-gold); box-shadow: 0 0 0 1px var(--accent-gold); }
.txt-hidden { opacity: 0; max-height: 0; overflow: hidden; padding: 0; border: 0; margin-bottom: 0; pointer-events: none; }
.txt-visible { opacity: 1; max-height: 100px; margin-bottom: 12px; pointer-events: auto; }

/* Status Badges */
.badge { display: inline-flex; align-items: center; justify-content: center; padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; font-family: var(--font-code); text-transform: uppercase; width: 100%; margin-bottom: 12px; letter-spacing: 0.05em; }
.b-ok { background: var(--success-dim); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
.b-warn { background: var(--danger-dim); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
.b-pend { background: var(--bg-base); color: var(--text-secondary); border: 1px solid var(--border-strong); }
.badge-global { font-size: 0.5rem; background: var(--accent-blue-dim); color: var(--accent-blue); padding: 2px 6px; border-radius: 4px; margin-left: 6px; border: 1px solid rgba(56, 189, 248, 0.3); font-family: var(--font-code); font-weight: 700; white-space: nowrap; }
.badge-gm { font-size: 0.65rem; background: rgba(168, 85, 247, 0.1); color: #c084fc; padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(168, 85, 247, 0.3); font-family: var(--font-code); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px; width: 100%; justify-content: center; letter-spacing: 0.05em; text-transform: uppercase; }
.badge-gm span { color: #e9d5ff; font-weight: 500; text-transform: none; font-family: var(--font-ui); }

/* Tooltips */
.info-icon { display: inline-flex; align-items: center; justify-content: center; margin-left: 6px; width: 14px; height: 14px; border-radius: 50%; background: var(--border-strong); color: var(--text-secondary); font-size: 0.55rem; font-family: var(--font-code); font-weight: bold; cursor: help; position: relative; }
.info-icon::after { content: attr(data-tip); position: absolute; bottom: 150%; left: 50%; transform: translateX(-50%); background: var(--bg-elevated); color: var(--text-primary); padding: 6px 10px; border-radius: 4px; font-size: 0.7rem; font-family: var(--font-ui); white-space: normal; width: max-content; max-width: 240px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-strong); opacity: 0; visibility: hidden; transition: 0.2s; z-index: 1000; text-transform: none; font-weight: 400; line-height: 1.4; }
.info-icon:hover { background: var(--accent-blue); color: var(--bg-base); }
.info-icon:hover::after { opacity: 1; visibility: visible; }
th .info-icon::after { bottom: auto; top: 150%; }

/* Modals & Sidebar Overlays */
.modal-overlay, .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); z-index: 9990; }
.sidebar-overlay.show { display: block; animation: fadeIn 0.2s; }
.config-sidebar { position: fixed; top: 0; left: -400px; width: 380px; height: 100%; background: var(--bg-surface); border-right: 1px solid var(--border-subtle); z-index: 9995; transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
.config-sidebar.open { left: 0; }
.sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border-subtle); }
.sidebar-header h3 { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); letter-spacing: 0.05em; }
.close-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
.close-btn:hover { color: var(--text-primary); }
.sidebar-content { padding: 24px; overflow-y: auto; flex-grow: 1; }

.modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-surface); border: 1px solid var(--border-strong); border-radius: 12px; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
.modal-header { padding: 16px 24px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; }
.modal-content { padding: 24px; overflow-y: auto; color: var(--text-primary); font-size: 0.85rem; line-height: 1.6; }
#notesModal .modal-box { width: 500px; max-width: 90%; }
#inspectorModal .modal-box { width: 850px; max-width: 95%; height: 85vh; }
.md-section { border-radius: 8px; padding: 20px; margin-bottom: 24px;}
.md-title { font-family: var(--font-code); font-size: 0.8rem; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle); letter-spacing: 0.05em;}

.tab-checklist { background: var(--bg-base); border: 1px solid var(--border-strong); border-radius: 6px; padding: 8px; max-height: 140px; overflow-y: auto; margin-bottom: 16px; display: flex; flex-direction: column; gap: 4px; }
.tab-check-item { color: var(--text-primary); text-transform: none; font-weight: 400; font-size: 0.8rem; margin: 0; padding: 4px 0;}
/* Utilities */
.loader { position: fixed; top: 0; left: 0; width: 0%; height: 2px; background: var(--accent-blue); transition: width 0.3s ease; z-index: 10005; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
/* Scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
</style>
